name: Links Status

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/Shanghai

jobs:
  links-status:
    runs-on: ubuntu-latest

    steps:
    - name: Pull Latest Repository
      uses: actions/checkout@v4

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Ensure temp folder is not empty
      run: |
        mkdir -p ./temp
        echo "placeholder" > ./temp/.keep

    - name: Download temp file artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        github_token: ${{secrets.GITHUB_TOKEN}}
        branch: main
        name: 'temp'
        path: './temp'
        if_no_artifact_found: warn

    - name: Check RSS feeds
      env:
        FCL_REPO: ${{ github.repository }}
      run: |
        echo "Checking RSS feeds..."
        python run.py
        echo "Generated files:"
        ls -la *.json
        echo "Temp folder:"
        ls -la ./temp
    
    - name: Upload temp file as artifact
      uses: actions/upload-artifact@v4
      with:
        name: 'temp'
        path: './temp'
        retention-days: 30

    - name: git config
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Commit changes
      run: |
        mkdir pages
        cp -r ./static/index.html ./static/favicon.ico ./static/edgeone.json ./temp/cache.json all.json errors.json status.json pages/
        cd pages
        git init
        git add .
        git commit -m "$(date +"%Y年%m月%d日-%H时%M分") GitHub Actions定时更新"
        git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:page

    - name: Trigger Tencent Cloud Pages Webhook
      run: |
        echo "Triggering Tencent Cloud Pages webhook..."
        max_retries=3
        retry_count=0
        success=false
        
        while [ $retry_count -lt $max_retries ]; do
          retry_count=$((retry_count + 1))
          echo "Attempt $retry_count of $max_retries..."
          
          response=$(curl -s -w "\n%{http_code}" -X POST "https://pages-api.cloud.tencent.com/v1/webhook/3c204cf9de1a98d4366d36a8d3f5937f5462b39b53025d2e34edd33021b3e6ec" \
            -H "Content-Type: application/json" \
            -d '{"message": "GitHub Actions build completed"}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" = "200" ]; then
            code=$(echo "$body" | grep -o '"code":[0-9]*' | head -1 | cut -d':' -f2)
            if [ "$code" = "0" ]; then
              echo "Webhook triggered successfully!"
              success=true
              break
            else
              echo "API returned error code: $code"
            fi
          else
            echo "HTTP request failed with status: $http_code"
          fi
          
          if [ $retry_count -lt $max_retries ]; then
            echo "Retrying in 3 seconds..."
            sleep 3
          fi
        done
        
        if [ "$success" = "false" ]; then
          echo "::error::Webhook trigger failed after $max_retries attempts"
          exit 1
        fi

    - name: Delete Workflow Runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 30
        keep_minimum_runs: 6

  keepalive-workflow:
    name: Keepalive Workflow
    if: ${{ always() }}
    needs: links-status
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
