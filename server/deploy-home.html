<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
<pre id="json-content">{"code": 200, "msg": "服务运行成功", "time": "<span id="last-update-time">加载中...</span>",  "data": {"pyq": "/all.json", "status": "/status.json"}, "blog": "https://www.xxrbk.cn"}</pre>

<script>
// 获取GitHub Actions最近一次运行时间
fetch('https://fc.xrbk.cn/all.json')
  .then(response => response.json())
  .then(data => {
    const lastUpdateTime = data.statistical_data?.last_updated_time || '无法获取';
    document.getElementById('last-update-time').textContent = lastUpdateTime;
  })
  .catch(error => {
    document.getElementById('last-update-time').textContent = '无法获取';
  });
</script>
</body>
</html>
