<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Circle Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 2rem 1rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #222;
        }
        .status {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .status::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 4px;
        }

        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto 2rem;
        }
        @media (max-width: 1024px) {
            .stats { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
        .stat-card {
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e5e5e5;
        }
        .stat-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: #222;
        }
        .stat-label {
            font-size: 0.875rem;
            color: #999;
            margin-top: 0.25rem;
        }

        /* 文章卡片 */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #444;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 1rem;
        }
        .articles {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto 2rem;
        }
        @media (max-width: 1024px) {
            .articles { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .articles { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .articles { grid-template-columns: 1fr; }
        }
        .article-card {
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            cursor: pointer;
            transition: all 0.2s;
        }
        .article-card:hover {
            border-color: #ccc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .article-title {
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #999;
        }
        .article-meta img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        /* 友链状态 */
        .links-status {
            max-width: 1200px;
            margin: 0 auto 2rem;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
            overflow: hidden;
        }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
        }
        @media (max-width: 1024px) {
            .links-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .links-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .links-grid { grid-template-columns: 1fr; }
        }
        .links-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #e5e5e5;
            background: #fafafa;
        }
        .links-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
        }
        .links-summary {
            font-size: 0.8rem;
            color: #999;
            display: flex;
            gap: 1rem;
        }
        .links-summary .ok { color: #22c55e; }
        .links-summary .fail { color: #ef4444; }
        .links-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f0f0f0;
            border-right: 1px solid #f0f0f0;
            font-size: 0.85rem;
        }
        .link-item:nth-child(4n) { border-right: none; }
        @media (max-width: 1024px) {
            .link-item:nth-child(4n) { border-right: 1px solid #f0f0f0; }
            .link-item:nth-child(3n) { border-right: none; }
        }
        @media (max-width: 768px) {
            .link-item:nth-child(3n) { border-right: 1px solid #f0f0f0; }
            .link-item:nth-child(2n) { border-right: none; }
        }
        @media (max-width: 480px) {
            .link-item { border-right: none; }
        }
        .link-item:hover { background: #fafafa; }
        .link-name {
            color: #333;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .link-status {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .link-status.ok {
            background: #dcfce7;
            color: #166534;
        }
        .link-status.fail {
            background: #fee2e2;
            color: #991b1b;
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            margin: 1rem 0;
        }
        .load-more button {
            background: #fff;
            border: 1px solid #ddd;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #666;
        }
        .load-more button:hover {
            background: #f5f5f5;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #999;
            margin-top: 2rem;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="./favicon.ico" alt="Logo" class="avatar">
        <h1>Friend Circle Lite</h1>
        <p class="status">服务运行中</p>
    </div>

    <!-- 统计卡片 -->
    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="stat-value" id="stat-friends">-</div>
            <div class="stat-label">友链</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-articles">-</div>
            <div class="stat-label">文章</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-active">-</div>
            <div class="stat-label">活跃</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-ok">-</div>
            <div class="stat-label">正常</div>
        </div>
    </div>

    <!-- 文章列表 -->
    <div class="section-title">最新文章</div>
    <div class="articles" id="articles">
        <div style="grid-column: 1/-1; text-align: center; color: #999; padding: 2rem;">加载中...</div>
    </div>
    <div class="load-more" id="load-more" style="display: none;">
        <button onclick="loadMore()">加载更多</button>
    </div>

    <!-- 友链状态 -->
    <div class="section-title">友链状态</div>
    <div class="links-status" id="links-status">
        <div class="links-header">
            <span class="links-title">站点检测</span>
            <span class="links-summary">加载中...</span>
        </div>
        <div class="links-grid" id="links-list">
        </div>
    </div>

    <div class="footer">
        Powered by <a href="https://www.xrbk.cn" target="_blank">新锐博客</a>
    </div>

    <script>
        let allArticles = [];
        let displayedCount = 0;
        const pageSize = 12;

        // 获取数据
        async function fetchData() {
            try {
                const [allRes, statusRes] = await Promise.all([
                    fetch('./all.json'),
                    fetch('./status.json')
                ]);

                const allData = await allRes.json();
                const statusData = await statusRes.json();

                // 更新统计
                updateStats(allData, statusData);

                // 显示文章
                allArticles = allData.article_data || [];
                displayArticles();

                // 显示友链状态
                displayLinksStatus(statusData);
            } catch (e) {
                document.getElementById('articles').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #999; padding: 2rem;">数据加载失败</div>';
            }
        }

        // 更新统计
        function updateStats(allData, statusData) {
            const stats = allData.statistical_data || {};
            document.getElementById('stat-friends').textContent = stats.friends_num || 0;
            document.getElementById('stat-articles').textContent = stats.article_num || 0;
            document.getElementById('stat-active').textContent = stats.active_num || 0;

            const links = statusData.link_status || [];
            const okCount = links.filter(d => d.success).length;
            const totalCount = links.length;
            document.getElementById('stat-ok').textContent = `${okCount}/${totalCount}`;
        }

        // 显示文章
        function displayArticles() {
            const container = document.getElementById('articles');
            const toShow = allArticles.slice(displayedCount, displayedCount + pageSize);

            if (displayedCount === 0) {
                container.innerHTML = '';
            }

            toShow.forEach(article => {
                const card = document.createElement('div');
                card.className = 'article-card';
                card.onclick = () => window.open(article.link, '_blank');
                card.innerHTML = `
                    <div class="article-title">${escapeHtml(article.title)}</div>
                    <div class="article-meta">
                        <img src="${article.avatar || './favicon.ico'}" onerror="this.src='./favicon.ico'">
                        <span>${escapeHtml(article.author)}</span>
                        <span>·</span>
                        <span>${article.created ? article.created.substring(0, 10) : ''}</span>
                    </div>
                `;
                container.appendChild(card);
            });

            displayedCount += toShow.length;

            // 显示/隐藏加载更多按钮
            document.getElementById('load-more').style.display =
                displayedCount < allArticles.length ? 'block' : 'none';
        }

        // 加载更多
        function loadMore() {
            displayArticles();
        }

        // 显示友链状态
        function displayLinksStatus(statusData) {
            const list = document.getElementById('links-list');
            const summary = document.querySelector('.links-summary');
            const links = statusData.link_status || [];

            if (links.length === 0) {
                list.innerHTML = '<div class="link-item" style="grid-column: 1/-1;"><span style="color: #999;">暂无数据</span></div>';
                return;
            }

            const okCount = links.filter(d => d.success).length;
            const failCount = links.length - okCount;
            summary.innerHTML = `
                <span class="ok"><span style="display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 4px;"></span>${okCount} 正常</span>
                ${failCount > 0 ? `<span class="fail"><span style="display: inline-block; width: 8px; height: 8px; background: #ef4444; border-radius: 50%; margin-right: 4px;"></span>${failCount} 异常</span>` : ''}
            `;

            list.innerHTML = links.map(item => `
                <div class="link-item">
                    <span class="link-name">
                        <img src="${item.favicon || './favicon.ico'}" width="16" height="16" style="border-radius: 50%;" onerror="this.src='./favicon.ico'">
                        ${escapeHtml(item.name)}
                    </span>
                    <span class="link-status ${item.success ? 'ok' : 'fail'}">${item.success ? '正常' : '异常'}</span>
                </div>
            `).join('');
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        fetchData();
    </script>
</body>
</html>
